name: Update Naukri Profile

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST
    - cron: '30 7 * * *'   # 1:00 PM IST
  workflow_dispatch:

jobs:
  update-naukri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install playwright==1.51.0
          python -m playwright install chromium

      - name: Run Naukri updater
        run: |
          python naukri_updater.py
        shell: pwsh
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}

      # Always upload screenshots (success + failure)
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: '*.png'